version: 2.1

workflows:
  version: 2.1
  build_and_deploy:
    jobs:
      - build:
          filters:
            tags:
              only: /.*/
          context:
            - "github"
            - "Docker Hub"

jobs:
  build:
    machine:
      image: ubuntu-2404:current
    steps:
      - checkout

      - run:
          name: Run Docker login
          command: |
            echo $DOCKER_PASS | docker login -u $DOCKER_USER --password-stdin

      - run:
          name: Run Shellcheck
          command: |
            docker build -t alpine-rootfs-builder .
            docker run --rm -v $(pwd):/workspace alpine-rootfs-builder \
              sh -c 'shellcheck builder/*.sh'

      - run:
          name: Set up QEMU binfmt handlers
          command: |
            docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - run:
          name: Build rootfs tarballs
          command: |
            VERSION="${CIRCLE_TAG}" ./build.sh
          no_output_timeout: 1800

      - run:
          name: Prepare artifacts
          command: |
            mkdir -p output
            mv rootfs* output/

      - run:
          name: Deploy
          command: |
            if [ -n "${CIRCLE_TAG}" ]; then
              go install github.com/tcnksm/ghr@latest
              MAJOR="${CIRCLE_TAG%%.*}"
              MINOR="${CIRCLE_TAG%.*}"
              PRE=""
              if [[ ${CIRCLE_TAG} = *"rc"* ]]; then
                PRE="-prerelease"
              fi
              # Publish versioned release
              ghr ${PRE} -replace -u "${GITHUB_USER}" "${CIRCLE_TAG}" output/
              # Update floating tags (major.minor, major, latest, stable)
              # skip for pre-releases
              if [ -z "${PRE}" ]; then
                ghr -replace -u "${GITHUB_USER}" "${MINOR}" output/
                ghr -replace -u "${GITHUB_USER}" "${MAJOR}" output/
                ghr -replace -u "${GITHUB_USER}" latest output/
                ghr -replace -u "${GITHUB_USER}" stable output/
              fi
            fi

      - store_artifacts:
          path: /home/circleci/project/output
