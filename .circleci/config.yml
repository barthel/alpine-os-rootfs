version: 2.1

workflows:
  build_and_deploy:
    jobs:
      - build:
          filters:
            tags:
              only: /.*/
          context:
            - "github"
            - "Docker Hub"

jobs:
  build:
    machine:
      image: ubuntu-2404:current
    steps:
      - checkout

      - run:
          name: Run Docker login
          command: |
            echo $DOCKER_PASS | docker login -u $DOCKER_USER --password-stdin

      - run:
          name: Run Shellcheck
          command: |
            docker build -t alpine-rootfs-builder .
            docker run --rm -v $(pwd):/workspace alpine-rootfs-builder \
              sh -c 'shellcheck builder/*.sh'

      - run:
          name: Set up QEMU binfmt handlers
          command: |
            docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - run:
          name: Build rootfs tarballs and push to Docker Hub
          command: |
            VERSION="${CIRCLE_TAG}" PUSH=true ./build.sh
          no_output_timeout: 1800

      - run:
          name: Collect artifacts
          command: |
            mkdir -p output
            for f in rootfs-*.tar.gz; do
              [ -f "${f}" ] && sha256sum "${f}" > "${f}.sha256"
            done
            mv rootfs-*.tar.gz rootfs-*.tar.gz.sha256 output/ 2>/dev/null || true

      - run:
          name: Deploy GitHub Release
          command: |
            if [ -n "${CIRCLE_TAG}" ]; then
              PRE=false
              [[ ${CIRCLE_TAG} = *"rc"* ]] && PRE=true
              API="https://api.github.com/repos/${GITHUB_USER}/alpine-os-rootfs"
              # Delete existing release if present
              RELEASE_ID=$(curl -sf -H "Authorization: token ${GITHUB_TOKEN}" \
                "${API}/releases/tags/${CIRCLE_TAG}" \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || true)
              if [ -n "${RELEASE_ID}" ]; then
                curl -sf -X DELETE -H "Authorization: token ${GITHUB_TOKEN}" \
                  "${API}/releases/${RELEASE_ID}" || true
              fi
              # Create release
              RESPONSE=$(curl -sf -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"tag_name\":\"${CIRCLE_TAG}\",\"name\":\"${CIRCLE_TAG}\",\"prerelease\":${PRE}}" \
                "${API}/releases")
              UPLOAD_URL=$(echo "${RESPONSE}" \
                | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'])" \
                | sed 's/{?name,label}//')
              # Upload tarballs and checksums
              for f in output/rootfs-*.tar.gz output/rootfs-*.tar.gz.sha256; do
                [ -f "${f}" ] || continue
                fname=$(basename "${f}")
                content_type="application/gzip"
                [[ "${f}" = *.sha256 ]] && content_type="text/plain"
                curl -sf -X POST \
                  -H "Authorization: token ${GITHUB_TOKEN}" \
                  -H "Content-Type: ${content_type}" \
                  --data-binary @"${f}" \
                  "${UPLOAD_URL}?name=${fname}"
              done
            fi

      - store_artifacts:
          path: /home/circleci/project/output
