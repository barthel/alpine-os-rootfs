version: 2.1

workflows:
  version: 2.1
  build_and_deploy:
    jobs:
      - build:
          filters:
            tags:
              only: /.*/
          context:
            - "github"
            - "Docker Hub"

jobs:
  build:
    machine:
      image: ubuntu-2404:current
    steps:
      - checkout

      - run:
          name: Run Docker login
          command: |
            echo $DOCKER_PASS | docker login -u $DOCKER_USER --password-stdin

      - run:
          name: Run Shellcheck
          command: |
            make shellcheck

      - run:
          name: Create Alpine ARM 32bit (armhf)
          command: |
            ALPINE_OS_VERSION=${CIRCLE_TAG} make armhf
          no_output_timeout: 1800

      - run:
          name: Create Alpine ARM 64bit (aarch64)
          command: |
            ALPINE_OS_VERSION=${CIRCLE_TAG} make arm64
          no_output_timeout: 1800

      - run:
          name: Create Alpine x86_64 (amd64)
          command: |
            ALPINE_OS_VERSION=${CIRCLE_TAG} make amd64
          no_output_timeout: 1800

      - run:
          name: Prepare artifacts
          command: |
            mkdir -p output
            mv rootfs* output/

      - run:
          name: Deploy
          command: |
            if [ -n "${CIRCLE_TAG}" ]; then
              go install github.com/tcnksm/ghr@latest
              MAJOR="${CIRCLE_TAG%%.*}"
              MINOR="${CIRCLE_TAG%.*}"
              PRE=""
              if [[ $CIRCLE_TAG = *"rc"* ]]; then
                PRE="-prerelease"
              fi
              # Publish versioned release
              ~/go/bin/ghr ${PRE} -replace -u "${GITHUB_USER}" "${CIRCLE_TAG}" output/
              # Update floating tags (major.minor, major, latest, stable)
              # skip for pre-releases
              if [ -z "${PRE}" ]; then
                ~/go/bin/ghr -replace -u "${GITHUB_USER}" "${MINOR}" output/
                ~/go/bin/ghr -replace -u "${GITHUB_USER}" "${MAJOR}" output/
                ~/go/bin/ghr -replace -u "${GITHUB_USER}" latest output/
                ~/go/bin/ghr -replace -u "${GITHUB_USER}" stable output/
              fi
            fi

      - store_artifacts:
          path: /home/circleci/project/output
